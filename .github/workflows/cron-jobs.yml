name: Nimbus Cron Jobs

on:
  schedule:
    # Audit: collect forecast data every 3 hours
    - cron: '0 */3 * * *'
    # Report: nightly AI analysis at 1am UTC (8pm ET)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - report
          - both

jobs:
  audit:
    if: >-
      github.event.schedule == '0 */3 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'audit' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger audit data collection
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 120 \
            "${{ secrets.VERCEL_APP_URL }}/api/audit")
          echo "Audit response: $response"
          if [ "$response" -ge 500 ]; then exit 1; fi

  report:
    if: >-
      github.event.schedule == '0 1 * * *' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'report' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger nightly AI report
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 300 \
            "${{ secrets.VERCEL_APP_URL }}/api/report")
          echo "Report response: $response"
          if [ "$response" -ge 500 ]; then exit 1; fi
